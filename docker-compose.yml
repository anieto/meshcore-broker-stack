services:
  broker:
    build: ./broker
    env_file: ./broker/.env
    ports:
      - "127.0.0.1:8883:8883"
    volumes:
      - broker-data:/data
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const n=require('net').createConnection(8883,'localhost');n.on('connect',()=>{n.destroy();process.exit(0)});n.on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3

  corescope:
    image: ghcr.io/kpa-clawbot/corescope:latest
    depends_on:
      - broker
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./corescope/data:/app/data
      - ./corescope/config.json:/app/data/config.json:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DISABLE_MOSQUITTO=true
      - DISABLE_CADDY=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3

  livemap:
    image: yellowcooln/meshcore-mqtt-live-map:latest
    container_name: meshtexas-livemap
    depends_on:
      - broker
    env_file: ./livemap/.env
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./livemap/data:/data
      - ./livemap/backup:/backup
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    healthcheck:
      # python:3.12-slim base image has no wget/curl installed — use
      # python3 directly instead (guaranteed present).
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  broker-data:
